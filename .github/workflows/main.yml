# ============================================================
#  CI/CD Pipeline — nodejs-demo-app
#  Trigger : push / PR to main
#  Jobs    : lint → test → build → push → deploy
# ============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Prevent redundant runs on rapid pushes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/nodejs-demo-app
  NODE_VERSION: '18'

jobs:
  # ──────────────────────────────────────────────
  # JOB 1 — Lint
  # ──────────────────────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Uncomment once you add ESLint to the project:
      # - name: Run ESLint
      #   run: npm run lint

      - name: Check package audit
        run: npm audit --audit-level=high

  # ──────────────────────────────────────────────
  # JOB 2 — Test
  # ──────────────────────────────────────────────
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ──────────────────────────────────────────────
  # JOB 3 — Build Docker image
  # ──────────────────────────────────────────────
  build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # Extract git metadata for tagging (branch, SHA, semver)
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            # Tag 'latest' only on pushes to main (not PRs)
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Set up QEMU for multi-arch builds (amd64 + arm64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Only log in on real pushes (not on PRs from forks)
      - name: Login to DockerHub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          # Push only on push events (not PRs)
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer caching via GitHub Actions Cache
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=${{ github.sha }}

      - name: Image summary
        if: github.event_name == 'push'
        run: |
          echo "### 🐳 Docker Image Built" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.DOCKERHUB_IMAGE }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** ${{ steps.push.outputs.digest }}" >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────
  # JOB 4 — Deploy (runs only on push to main)
  # ──────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    # Protect production deploys with a GitHub Environment
    environment:
      name: production
      url: ${{ steps.deploy.outputs.app_url }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # ── Option A: Deploy to a remote server via SSH ──────────
      # Uncomment and configure secrets (SSH_HOST, SSH_USER, SSH_KEY)
      # to deploy to a VPS / EC2 / DigitalOcean droplet.
      #
      # - name: Deploy to production server
      #   id: deploy
      #   uses: appleboy/ssh-action@v1.0.3
      #   with:
      #     host: ${{ secrets.SSH_HOST }}
      #     username: ${{ secrets.SSH_USER }}
      #     key: ${{ secrets.SSH_KEY }}
      #     script: |
      #       docker pull ${{ env.DOCKERHUB_IMAGE }}:latest
      #       docker stop nodejs-demo-app || true
      #       docker rm   nodejs-demo-app || true
      #       docker run -d \
      #         --name nodejs-demo-app \
      #         --restart unless-stopped \
      #         -p 3000:3000 \
      #         -e NODE_ENV=production \
      #         ${{ env.DOCKERHUB_IMAGE }}:latest
      #       echo "::set-output name=app_url::http://${{ secrets.SSH_HOST }}:3000"

      # ── Option B: Simulated deploy (default — replace with real target) ──
      - name: Simulate deployment
        id: deploy
        run: |
          echo "Deploying image: ${{ env.DOCKERHUB_IMAGE }}:latest"
          echo "Commit: ${{ github.sha }}"
          echo "Triggered by: ${{ github.actor }}"
          echo ""
          echo "✅ Deployment simulation complete."
          echo "Replace this step with your real deployment target"
          echo "(SSH, AWS ECS, Render, Railway, Fly.io, etc.)"

      - name: Deployment summary
        run: |
          echo "### 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Actor:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.DOCKERHUB_IMAGE }}:latest\`" >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────
  # JOB 5 — Notify on failure
  # ──────────────────────────────────────────────
  notify-failure:
    name: 📣 Notify on Failure
    runs-on: ubuntu-latest
    needs: [lint, test, build, deploy]
    if: failure() && github.ref == 'refs/heads/main'

    steps:
      - name: Post failure notice
        run: |
          echo "### ❌ Pipeline Failed" >> $GITHUB_STEP_SUMMARY
          echo "One or more jobs failed on branch \`${{ github.ref_name }}\`." >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.sha }}\` by **${{ github.actor }}**" >> $GITHUB_STEP_SUMMARY
          # Wire in Slack / email / PagerDuty here via their respective actions
