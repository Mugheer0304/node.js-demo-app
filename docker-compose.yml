version: '3.9'

services:
  app:
    build:
      context: .
      target: production
    container_name: nodejs-demo-app
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - APP_VERSION=1.0.0
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Optional: run tests in an isolated container
  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: nodejs-demo-app-tests
    environment:
      - NODE_ENV=test
    profiles:
      - testing
